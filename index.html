<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Video Profesional</title>
<style>
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background-color: #121212;
        font-family: Arial, sans-serif;
        user-select: none;
        -webkit-user-select: none;
    }
    .video-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%; height: 100%;
    }
    video {
        width: 90%;
        max-width: 900px;
        height: auto;
        background: #000;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .overlay {
        position: absolute;
        top:0; left:0; right:0; bottom:0;
        z-index: 10;
    }
</style>
</head>
<body>

<div class="video-container">
    <video id="videoPlayer" controls controlsList="nodownload nofullscreen noremoteplayback" preload="metadata">
        <source src="https://pixeldrain.com/api/file/qPktNvEC" type="video/mp4">
        Browsermu tidak mendukung pemutaran video ini.
    </video>
    <div class="overlay"></div>
</div>

<script>
    const video = document.getElementById('videoPlayer');

    // nonaktifkan klik kanan
    document.addEventListener('contextmenu', e => e.preventDefault());

    // nonaktifkan drag video
    video.addEventListener('dragstart', e => e.preventDefault());

    // nonaktifkan pinch/zoom di mobile
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());

    // overlay untuk cegah long-press menu
    const overlay = document.querySelector('.overlay');
    overlay.addEventListener('touchstart', e => e.preventDefault());
    overlay.addEventListener('mousedown', e => e.preventDefault());
</script>

</body>
</html>
